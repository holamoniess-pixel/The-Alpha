# Alpha Omega System Configuration
# Voice-Activated PC Control System (Hey Google Style)
# Version: 2.0.0 - Production MVP

system:
  name: "AlphaOmega"
  version: "2.0.0"
  wake_word: "hey alpha"
  language: "en-US"
  max_memory_mb: 2048
  learning_enabled: true
  auto_start: true
  offline_mode: true
  debug_mode: false

voice:
  engine: "whisper-base"  # Options: whisper-base, whisper-small, vosk
  sample_rate: 16000
  chunk_size: 1024
  timeout: 5
  sensitivity: 0.8
  noise_reduction: true
  wake_word_sensitivity: 1.0
  command_timeout: 10

intelligence:
  llm_model: "llama-7b-q4"
  context_window: 4096
  temperature: 0.7
  max_tokens: 512
  reasoning_enabled: true
  multi_modal: true
  code_generation: true
  preferred_provider: "local"
  local_model: "phi-3-mini"
  offline_mode: true
  providers:
    openai:
      enabled: false
      model: "gpt-4o-mini"
    anthropic:
      enabled: false
      model: "claude-3-5-haiku-latest"
    google:
      enabled: false
      model: "gemini-2.0-flash"
    groq:
      enabled: false
      model: "llama-3.1-8b-instant"
    openrouter:
      enabled: false
      model: "google/gemini-2.0-flash-001"

learning:
  pattern_recognition: true
  behavior_analysis: true
  prediction_enabled: true
  adaptation_rate: 0.1
  memory_retention_days: 30
  learning_rate: 0.01
  confidence_threshold: 0.7

automation:
  gui_automation: true
  system_commands: true
  web_automation: true
  file_operations: true
  safety_mode: true
  confirmation_required: false
  max_concurrent_tasks: 5

security:
  voice_auth: true
  command_whitelist: true
  activity_logging: true
  threat_detection: true
  encryption_enabled: true
  secure_mode: true
  permission_required: true

performance:
  cpu_limit: 80
  memory_limit: 85
  response_time_ms: 500
  cache_size_mb: 512
  optimization_level: "high"
  background_tasks: true
  resource_monitoring: true

gaming:
  game_detection: true
  performance_mode: true
  macro_support: true
  voice_commands: true
  auto_optimization: true
  game_profiles: true
  fps_monitoring: true

ui:
  theme: "cyberpunk"
  particle_effects: true
  animations: true
  transparency: 0.8
  always_on_top: false
  mini_mode: true
  dashboard_enabled: true

integrations:
  discord: false
  spotify: true
  chrome: true
  vscode: true
  steam: true
  obs: false

logging:
  level: "INFO"
  file_logging: true
  console_logging: true
  max_log_size_mb: 100
  log_retention_days: 7
  performance_logging: true
  error_tracking: true

advanced:
  multi_threading: true
  async_processing: true
  memory_optimization: true
  cache_optimization: true
  network_optimization: false
  gpu_acceleration: false
  experimental_features: false